name: Actualizar portal desde Excel

on:
  push:
    branches:
      - main
    paths:
      - "datos/oportunidades_financiacion.xlsx"
      - "scripts/generar_portal.py"
      - ".github/workflows/actualizar-portal.yml"

  workflow_dispatch:

  schedule:
    # Cada tres días a las 10:00 UTC,
    # equivalente a las 6:00 a. m. en República Dominicana.
    - cron: "0 10 */3 * *"

permissions:
  contents: write

jobs:
  actualizar-portal:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generar index.html
        run: |
          python scripts/generar_portal.py

      - name: Comprobar cambios
        id: cambios
        run: |
          if git diff --quiet index.html; then
            echo "hay_cambios=false" >> "$GITHUB_OUTPUT"
            echo "El index.html no cambió."
          else
            echo "hay_cambios=true" >> "$GITHUB_OUTPUT"
            echo "El index.html fue actualizado."
          fi

      - name: Guardar index.html actualizado
        if: steps.cambios.outputs.hay_cambios == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Actualizar portal desde Excel"
          git push
